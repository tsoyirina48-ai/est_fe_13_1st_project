  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      margin: 0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    /* blue block */

    .banner{
      width:100%;
      height:320px;
      background-image:url('banner.png');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .banner-content{
      position:relative;
      z-index:2;
      text-align:center;
    }

    .banner-content h1{
      font-size:64px;
      margin-bottom:20px;
    }

    .banner-content p{
      font-size:36px;
      margin-bottom:25px;
    }

    .banner-content button{
      padding:12px 30px;
      border:none;
      border-radius:30px;
      background:white;
      color:#1f4ed8;
      font-weight:bold;
      cursor:pointer;
    }

    /* 밑블럭 */

    .content{
      position:relative;
      width:1100px;
      margin:50px auto;
      background:white;
      padding:50px;
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .content h2{
      font-size:36px;
      margin-bottom:20px;
      color:#111;
    }

    .content p{
      color:#666;
      line-height:1.7;
      margin-bottom:30px;
    }

    .cards{
      display:flex;
      gap:25px;
    }

    .card{
      flex:1;
      background:#f0f4ff;
      padding:30px;
      border-radius:15px;
    }

    .card h3{
      margin-bottom:15px;
      color:#1f4ed8;
    }
    .footer-icons{
      display: flex;
      position:absolute;
      right: 40px;
      top:100px;
      gap: 12px;
    }
    .footer-icons img{
      width:30px;
      height:30px;  
    }
    .footer-text{
      margin-top: 20px;
      padding-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

  <!-- blue block -->

  <div class="banner">
   
    <div class="banner-content">

    

      <p>
        2026 인공지능사관학교<br>
        7기 교육생 모집
      </p>

      <button>보러가기</button>

    </div>

  </div>

  <!-- 밑블럭 -->

  <div class="content">

    <img src="logo.png" alt="EST camp logo"
    class="logo-img"> 

    <p>
      실무 중심 프로젝트와 AI 기반 웹 개발 교육을 진행합니다.
    </p>

    <div class="cards">

      <div class="card">
        <h2>프론트엔드 과정</h2>
        <p>HTML CSS JavaScript 학습</p>
      </div>

      <div class="card">
        <h2>백엔드 과정</h2>
        <p>서버와 데이터베이스 개발</p>
      </div>

      <div class="card">
        <h2>AI 프로젝트</h2>
        <p>AI 활용 실전 프로젝트</p>
      </div>

       <div class="footer-icons">

        <a href="#">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="instagram">
        </a>

        <a href="#">
          <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg" alt="kakao">
        </a>
       </div>
      </div>
      <div class="footer-text">

</div>
    </div>

  
      
</body>
