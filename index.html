<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 과정 찾기 섹션 -->
     <section class="course">
        <div class="course-container">
            <header class="course-intro">
                <h2 class="course-title">나에게 맞는 <span>부트캠프 과정</span> 찾기</h2>
                <a href="#" class="course-cta">자세히 보기</a>
            </header>
            <div class="course-grid">
                <article class="course-card">
                    <div class="course-card-info">
                        <h3 class="course-card-title">입문자<span>기초</span>다지기</h3>
                        <p class="course-card-desc">프로그래밍 기초</p>
                    </div>
                    <div class="course-card-image">
                        <img src="" alt="입문자 과정을 안내하는 알약 캐릭터">
                    </div>
                </article>
                <article class="course-card">
                    <div class="course-card-info">
                        <h3 class="course-card-title">프론트엔드<span>핵심 인재</span>양성</h3>
                        <p class="course-card-desc">React, TypeScript 마스터</p>
                    </div>
                    <div class="course-card-image">
                        <img src="" alt="프론트엔드 과정을 알약 캐릭터">
                    </div>
                </article>
                <article class="course-card">
                    <div class="course-card-info">
                        <h3 class="course-card-title">데이터 분석<span>AI 트렌드</span> 리딩</h3>
                        <p class="course-card-desc">Python, 데이터 시각화</p>
                    </div>
                    <div class="course-card-image">
                        <img src="" alt="데이터분석 과정을 알약 캐릭터">
                    </div>
                </article>
                <article class="course-card">
                    <div class="course-card-info">
                        <h3 class="course-card-title">가디언즈 <span>인프라보안</span></h3>
                        <p class="course-card-desc">보안 관제, 침해 사고 대응</p>
                    </div>
                    <div class="course-card-image">
                        <img src="" alt="인프라보안 과정을 안내하는 알약 캐릭터">
                    </div>
                </article>
            </div>
        </div>
     </section>
</body>
</html>
