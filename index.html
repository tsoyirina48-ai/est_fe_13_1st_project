<!Doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>EST Camp</title>
      <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
  </head>
  <body>
    <!-- 박소호 -->
    <!-- hero 섹션 -->
    <section class="title-hero">
      <div class="container">
        <div class="hero-title-box">
          <span class="category">AI시대, 확실한 커리어</span>
          <h2 class="text-title-xl">이스트캠프</h2>
        </div>
        <p class="hero-title-desc">AI 선도기업에서 만든 실무기반 IT 취업 부트캠프</p>

        <div class="title-button-box">
          <a class="Button-Big left-btn" href="#">지원하기
            <span class="material-icons">keyboard_arrow_right</span>
          </a>

          <a class="Button-Big right-btn" href="#">과정 탐색하기
            <span class="material-icons">keyboard_arrow_right</span>
          </a>
        </div>
      </div>
    </section>

    <!-- 온라인과정 섹션 -->
    <section class="online">
      <div class="container">
        <!-- 온라인 헤더-->
      <header class="intro-header">
        <h2 class="text-h2-lg">이스트소프트 부트캠프</h2>
        <ul class="online-category">
          <li class="text-p on_category">
            <button class="active">온라인과정</button>
          </li>
          <li class="text-p on-off_category">
            <button>온/오프라인과정</button>
          </li>
        </ul>
      </header>
      <!-- 슬라이드네비 -->
      <div class="slides_nav">
        <button class="slide-btn prev">
          <span class="material-icons">keyboard_arrow_left</span>
        </button>
        <button class="slide-btn next">
          <span class="material-icons">keyboard_arrow_right</span>
        </button>
      </div>
      <!-- 온라인 컨텐츠 -->
      <section class="online-content">
        <ul class="list">
          <!-- item -->
          <li class="item1">
            <a href="#">
              <!-- 이미지 -->
              <img src="images/front-img.jpg" alt="온라인과정 이미지">
              <!-- 텍스트 박스 -->
              <div class="text-box">
                <h3 class="text-h3-md">프론트엔드 개발 14기</h3>
                <p class="text-p">모집기간. 0000.00.00~00.00</p>
              </div>
            </a>
          </li>

          <li class="item2">
            <a href="">
              <!-- 이미지 -->
              <img src="images/AI-img.jpg" alt="온라인과정 이미지">
              <!-- 텍스트 박스 -->
              <div class="text-box">
                <h3 class="text-h3-md">AI 퀀트 4기</h3>
                <p class="text-p">모집기간. 2026.05.27~10.23</p>
              </div>
            </a>
          </li>

          <li class="item3">
            <a href="">
              <!-- 이미지 -->
              <img src="images/IOS-img.jpg" alt="온라인과정 이미지">
              <!-- 텍스트 박스 -->
              <div class="text-box">
                <h3 class="text-h3-md">IOS앱 개발 7기</h3>
                <p class="text-p">모집기간. 2026.03.25~05.18</p>
              </div>
            </a>
          </li>
        </ul>
      </section>
      </div>
    </section>

    <!-- //박소호 -->

    <!-- 최이리나 => 박소호 수정 -->
     <div class="cta-banner">
      <div class="container">
        <div class="cta-title">
          <h2 class="text-title-xl">2026 인공지능사관학교</h2>
          <h2 class="text-title-xl">7기 교육생 모집</h2>
        </div>
        <button class="btn-cta">
          <a href="#">보러가기</a>
        </button>
      </div>
    </div>
    <!-- 최이리나 => 박소호 수정 -->

</body>
</html>
